name: ♻ zizmor-codeql

on:
  workflow_call:
    inputs:
      config_file:
        description: The path to the zizmor configuration file.
        type: string
        required: false

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # Required to upload code scanning results
      actions: read # Required to upload code scanning results in private repositories
      contents: read # Required to checkout private repositories
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run zizmor 🌈
        run: |
          optional_args=()

          if [[ -f "$CONFIG_FILE" ]]; then
            optional_args+=(--config "$CONFIG_FILE")
          elif [[ -n "$CONFIG_FILE" ]]; then
            echo "Config file '$CONFIG_FILE' not found" >&2
            exit 1
          fi

          uvx zizmor --format=sarif "${optional_args[@]}" . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file }}

      - name: Upload code scanning results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
          category: zizmor
