# Login to a Docker registry, then build and push Docker image.
name: ♻ docker

on:
  workflow_call:
    inputs:
      runs_on:
        description: The label of the runner (GitHub- or self-hosted) to run this workflow on. Defaults to `ubuntu-24.04`.
        type: string
        required: false
        default: ubuntu-24.04

      environment:
        description: The name of the GitHub environment that this job references.
        type: string
        required: false

      working_directory:
        description: The path of the working directory containing the Dockerfile to build an image from.
        type: string
        default: "."
        required: false

      registry:
        description: The URL of the Docker registry to push the image to.
        type: string
        required: true

      username:
        description: The username used to login to the Docker registry.
        type: string
        required: true

      repository:
        description: The repository in the Docker registry to push the image to.
        type: string
        required: false
        default: ${{ github.repository }}

      tag:
        description: A tag for the image.
        type: string
        required: false
        default: ${{ github.run_number }}

      tag_latest:
        description: Push latest tag.
        type: boolean
        required: false
        default: true

      build_args:
        description: Build arguments as a JSON object (e.g., '{"KEY1":"VALUE1","KEY2":"VALUE2"}').
        type: string
        required: false
        default: "{}"

    secrets:
      DOCKER_PASSWORD:
        description: The password used to login to the Docker registry.
        required: true

      BUILD_SECRETS:
        description: Build secrets as a JSON object (e.g., '{"NPM_TOKEN":"token","PIP_URL":"url"}').
        required: false

    outputs:
      image:
        description: The Docker image that was built.
        value: ${{ jobs.docker.outputs.image }}

permissions: {}

jobs:
  docker:
    name: Docker
    runs-on: ${{ inputs.runs_on }}
    if: github.actor != 'dependabot[bot]'
    environment:
      name: ${{ inputs.environment }}
      deployment: false
    permissions:
      contents: read # Required to checkout the repository
      packages: read # Required to pull packages from GitHub Packages registry
    env:
      IMAGE: ${{ inputs.registry }}/${{ inputs.repository }}:${{ inputs.tag }}
      IMAGE_LATEST: ${{ inputs.registry }}/${{ inputs.repository }}:latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Docker Build
        env:
          BUILD_ARGS_INPUT: ${{ inputs.build_args }}
          BUILD_SECRETS_INPUT: ${{ secrets.BUILD_SECRETS }}
          TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          set -euo pipefail

          optional_args=()

          # Tag image with "latest" if `tag_latest` is true.
          if [ "$TAG_LATEST" = "true" ]; then
            optional_args+=(--tag "$IMAGE_LATEST")
          fi

          # Convert JSON build args to repeated --build-arg flags.
          mapfile -t build_args < <(jq -r 'to_entries[] | "\(.key)=\(.value)"' <<<"$BUILD_ARGS_INPUT")
          for build_arg in "${build_args[@]}"; do
            optional_args+=(--build-arg "$build_arg")
          done

          # Convert JSON secrets to repeated --secret flags.
          if [ -n "${BUILD_SECRETS_INPUT:-}" ]; then
            if ! jq -e 'type == "object"' <<<"$BUILD_SECRETS_INPUT" >/dev/null; then
              echo "BUILD_SECRETS must be a valid JSON object." >&2
              exit 1
            fi

            mapfile -t build_secret_keys < <(jq -r 'keys[]' <<<"$BUILD_SECRETS_INPUT")
            for key in "${build_secret_keys[@]}"; do
              value="$(jq -r --arg key "$key" '.[$key]' <<<"$BUILD_SECRETS_INPUT")"

              if [ -z "$value" ] || [ "$value" = "null" ]; then
                echo "BUILD_SECRETS contains empty value for key '$key'." >&2
                exit 1
              fi

              # Export each secret as an env var so Docker Buildx can source it via env=.
              export "$key=$value"
              optional_args+=(--secret "id=$key,env=$key")
            done
          fi

          docker buildx build --push . --tag "$IMAGE" "${optional_args[@]}"

    outputs:
      image: ${{ env.IMAGE }}
      image_latest: ${{ env.IMAGE_LATEST }}
