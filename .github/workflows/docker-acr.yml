# Login to Azure Container Registry using OpenID Connect (OIDC), then build and push Docker image.
name: ♻ docker-acr

on:
  workflow_call:
    inputs:
      runs_on:
        description: The label of the runner (GitHub- or self-hosted) to run this workflow on. Defaults to `ubuntu-24.04`.
        type: string
        required: false
        default: ubuntu-24.04

      environment:
        description: The name of the GitHub environment that this job references.
        type: string
        required: false

      working_directory:
        description: The path of the working directory containing the Dockerfile to build an image from.
        type: string
        default: "."
        required: false

      registry_name:
        description: The name of the Azure Container Registry to push the Docker image to.
        type: string
        required: true

      repository:
        description: The repository in the Azure Container Registry to push the Docker image to.
        type: string
        required: false
        default: ${{ github.repository }}

      tag:
        description: A tag for the image.
        type: string
        required: false
        default: ${{ github.run_number }}

      tag_latest:
        description: Push latest tag.
        type: boolean
        required: false
        default: true

      build_args:
        description: Build arguments as a JSON object (e.g., '{"KEY1":"VALUE1","KEY2":"VALUE2"}').
        type: string
        required: false
        default: "{}"

    secrets:
      AZURE_CLIENT_ID:
        description: The client ID of the service principal to use for authenticating to Azure.
        required: true

      AZURE_SUBSCRIPTION_ID:
        description: (Deprecated) The ID of an Azure subscription to authenticate to.
        required: false

      AZURE_TENANT_ID:
        description: The ID of the Microsoft Entra tenant to authenticate to.
        required: true

      BUILD_SECRETS:
        description: Build secrets as a JSON object (e.g., '{"NPM_TOKEN":"token","PIP_URL":"url"}').
        required: false

    outputs:
      image:
        description: The Docker image that was built.
        value: ${{ jobs.docker.outputs.image }}

permissions: {}

env:
  AZURE_CORE_OUTPUT: none

jobs:
  docker:
    name: Docker
    runs-on: ${{ inputs.runs_on }}
    if: github.actor != 'dependabot[bot]'
    environment:
      name: ${{ inputs.environment }}
      deployment: false
    permissions:
      contents: read # Required to checkout the repository
      id-token: write # Required to login to Azure using OIDC
      packages: read # Required to pull packages from GitHub Packages registry
    env:
      IMAGE: ${{ inputs.registry_name }}.azurecr.io/${{ inputs.repository }}:${{ inputs.tag }}
      IMAGE_LATEST: ${{ inputs.registry_name }}.azurecr.io/${{ inputs.repository }}:latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # Don't require access to the subscription control plane. Required for
          # service principals that only have access to the ACR data plane,
          # e.g., service principals with the "AcrPush" role at the ACR scope.
          allow-no-subscriptions: true

      - name: Login to ACR
        env:
          REGISTRY_NAME: ${{ inputs.registry_name }}
        run: az acr login --name "$REGISTRY_NAME"

      - name: Run Docker Build
        env:
          BUILD_ARGS_INPUT: ${{ inputs.build_args }}
          BUILD_SECRETS_INPUT: ${{ secrets.BUILD_SECRETS }}
          TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          set -euo pipefail

          BUILDX_ARGS=()

          # Tag image with "latest" if `tag_latest` is true.
          if [ "$TAG_LATEST" = "true" ]; then
            BUILDX_ARGS+=(--tag "$IMAGE_LATEST")
          fi

          # Convert JSON build args to repeated --build-arg flags.
          mapfile -t BUILD_ARGS < <(jq -r 'to_entries[] | "\(.key)=\(.value)"' <<< "$BUILD_ARGS_INPUT")
          for build_arg in "${BUILD_ARGS[@]}"; do
            BUILDX_ARGS+=(--build-arg "$build_arg")
          done

          # Convert JSON secrets to repeated --secret flags.
          if [ -n "${BUILD_SECRETS_INPUT:-}" ]; then
            if ! jq -e 'type == "object"' <<< "$BUILD_SECRETS_INPUT" > /dev/null; then
              echo "BUILD_SECRETS must be a valid JSON object." >&2
              exit 1
            fi

            SECRETS_DIR="$(mktemp -d)"
            trap 'rm -rf "$SECRETS_DIR"' EXIT

            mapfile -t BUILD_SECRET_KEYS < <(jq -r 'keys[]' <<< "$BUILD_SECRETS_INPUT")
            for key in "${BUILD_SECRET_KEYS[@]}"; do
              value="$(jq -r --arg key "$key" '.[$key]' <<< "$BUILD_SECRETS_INPUT")"

              if [ -z "$value" ] || [ "$value" = "null" ]; then
                echo "BUILD_SECRETS contains empty value for key '$key'." >&2
                exit 1
              fi

              secret_file="$(mktemp "$SECRETS_DIR/secret.XXXXXX")"

              printf '%s' "$value" > "$secret_file"
              BUILDX_ARGS+=(--secret "id=$key,src=$secret_file")
            done
          fi

          docker buildx build --push . --tag "$IMAGE" "${BUILDX_ARGS[@]}"

    outputs:
      image: ${{ env.IMAGE }}
      image_latest: ${{ env.IMAGE_LATEST }}
