# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: ♻ trivy-config-codeql

on:
  workflow_call:
    inputs:
      severity:
        description: The severity levels to include in the scan results.
        type: string
        required: false
        default: "CRITICAL,HIGH"

permissions: {}

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # Required to upload code scanning results
      actions: read # Required to upload code scanning results in private repositories
      contents: read # Required to checkout private repositories
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "config"
          hide-progress: false
          format: sarif
          exit-code: "0"
          ignore-unfixed: true
          severity: ${{ inputs.severity }}
          output: trivy-iac-results.sarif
          limit-severities-for-sarif: true

      - name: Upload code scanning results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: "trivy-iac-results.sarif"
